<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigaStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-b" aria-hidden="true"></div>
  <div class="leaf-layer" aria-hidden="true">
    <span class="leaf leaf-a"></span>
    <span class="leaf leaf-b"></span>
    <span class="leaf leaf-c"></span>
    <span class="leaf leaf-d"></span>
    <span class="leaf leaf-e"></span>
    <span class="leaf leaf-f"></span>
    <span class="leaf leaf-g"></span>
    <span class="leaf leaf-h"></span>
  </div>

  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>GigaStock</h1>
        <p class="sub">Fast live stock view with a custom quick check panel.</p>
      </div>
      <div class="status-stack">
        <span id="sourceBadge" class="chip">Source: booting</span>
        <span id="clockBadge" class="chip chip-strong">--:--</span>
      </div>
    </header>

    <section class="meta-strip">
      <div class="meta-card"><span>Next Restock</span><strong id="nextInfo">Loading...</strong></div>
      <div class="meta-card"><span>Live Status</span><strong id="liveInfo">Syncing...</strong></div>
    </section>

    <section id="quickCheck" class="quick-check"></section>

    <nav class="tabs" aria-label="Data tabs">
      <button class="tab is-active" data-tab="seeds">Seeds</button>
      <button class="tab" data-tab="gears">Gears</button>
      <button class="tab" data-tab="crates">Crates</button>
      <button class="tab" data-tab="pets">Rarest Pets</button>
      <button class="tab" data-tab="weather">Weather</button>
      <button class="tab" data-tab="events">Website Details</button>
    </nav>

    <section class="panel">
      <div id="toolbar" class="toolbar"></div>
      <div id="content" class="content"></div>
    </section>

    <section class="console-wrap">
      <details class="log-dropdown">
        <summary>Run Log</summary>
        <pre id="log" class="log">Starting...</pre>
      </details>
    </section>
  </main>

  <template id="listTemplate">
    <div class="list-head row-grid">
      <span>Name</span>
      <span>Rarity</span>
      <span>Price</span>
      <span>Now</span>
      <span>Next (most likely)</span>
    </div>
    <div class="list-body" id="listBody"></div>
  </template>

  <script src="app.js"></script>
</body>
</html>
